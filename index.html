<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-2">

    <div class="w-full bg-white shadow-lg pb-6 min-h-screen">
    <!-- Header -->
    <div class="bg-purple-600 p-4 text-white flex justify-between items-center">
        <h1 class="font-bold text-lg">BerBer 2D</h1>
        <div class="flex gap-4"><span>🎁</span><span>🗓️</span></div>
    </div>

    <!-- Live Result Section -->
    <div class="text-center py-6 border-b">
        <p class="text-red-500 font-bold animate-pulse">● LIVE</p>
        <p id="main-live-result" class="text-4xl font-bold my-2">--</p>
        
        <!-- Date and Set/Value Section -->
        <div class="grid grid-cols-3 gap-2 mt-4 px-2 text-gray-700">
            <div class="text-center">
                <p class="text-[10px] text-gray-400 underline">Set</p>
                <p class="font-bold text-sm">12345.56</p>
            </div>
            <div class="text-center">
                <p class="text-[10px] text-gray-400 underline">Time</p>
                <p id="live-clock" class="font-bold text-sm">00:00:00</p>
            </div>
            <div class="text-center">
                <p class="text-[10px] text-gray-400 underline">Value</p>
                <p class="font-bold text-sm">12345.56</p>
            </div>
        </div>
        <p class="text-xs text-gray-400 mt-2" id="current-date"></p>
    </div>

    <!-- History Section -->
    <div class="flex flex-col gap-2 px-4 mt-6">
        <div class="bg-purple-100 p-3 rounded-lg flex justify-between items-center">
            <span class="font-bold text-sm">06:00 PM</span>
            <span id="val-06pm" class="font-bold text-lg">--</span>
        </div>
        <div class="bg-purple-100 p-3 rounded-lg flex justify-between items-center">
            <span class="font-bold text-sm">08:00 PM</span>
            <span id="val-08pm" class="font-bold text-lg">--</span>
        </div>
        <div class="bg-purple-100 p-3 rounded-lg flex justify-between items-center">
            <span class="font-bold text-sm">09:00 PM</span>
            <span id="val-09pm" class="font-bold text-lg">--</span>
        </div>
        <div class="bg-purple-100 p-3 rounded-lg flex justify-between items-center">
            <span class="font-bold text-sm">10:00 PM</span>
            <span id="val-10pm" class="font-bold text-lg">--</span>
        </div>
        <div class="bg-purple-100 p-3 rounded-lg flex justify-between items-center">
            <span class="font-bold text-sm">11:00 PM</span>
            <span id="val-11pm" class="font-bold text-lg">--</span>
        </div>
    </div>
</div>

<script>
function updateDisplay() {
    const now = new Date();
    // Update Time
    document.getElementById("live-clock").innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    // Update Date
    document.getElementById("current-date").innerText = now.toLocaleDateString();

    const currentHour = now.getHours();
    let lastResult = "--";
    const sessions = [
        { id: "val-06pm", time: 18, result: "81" },
        { id: "val-08pm", time: 20, result: "12" },
        { id: "val-09pm", time: 21, result: "--" },
        { id: "val-10pm", time: 22, result: "--" },
        { id: "val-11pm", time: 23, result: "--" }
    ];
    sessions.forEach(s => {
        const el = document.getElementById(s.id);
        if (el && currentHour >= s.time) {
            el.innerText = s.result;
            lastResult = s.result;
        }
    });
    const mainEl = document.getElementById("main-live-result");
    if (mainEl) mainEl.innerText = lastResult;
}
setInterval(updateDisplay, 1000);
updateDisplay();
</script>

</body>
</html>
